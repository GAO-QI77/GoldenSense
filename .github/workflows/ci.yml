name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run test suite
        env:
          AGENT_PUBLIC_API_KEYS: dev-public-key
          AGENT_INTERNAL_API_KEYS: dev-internal-key
        run: python -m pytest

  web-build-and-e2e:
    name: Web build and e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: modern_showcase_site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: modern_showcase_site/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build consumer web
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: npm run test:e2e

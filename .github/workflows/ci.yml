name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run official gateway test suite in a single process
        env:
          AGENT_PUBLIC_API_KEYS: dev-public-key
          AGENT_INTERNAL_API_KEYS: dev-internal-key
        run: |
          python -m pytest -q \
            tests/test_agent_analyze.py \
            tests/test_news_ingest_service.py \
            tests/test_memory_service.py \
            tests/test_inference_service.py \
            tests/test_market_snapshot_service.py \
            tests/test_impact_breakdown.py \
            tests/test_vix_data.py

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Start minimal compose stack
        run: |
          docker compose up -d --build redis postgres inference memory market_ingest news_ingest agent_gateway

      - name: Wait for gateway
        run: |
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8020/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "agent gateway did not become healthy in time" >&2
          exit 1

      - name: Run end-to-end smoke script
        env:
          AGENT_PUBLIC_API_KEY: dev-public-key
          AGENT_INTERNAL_API_KEY: dev-internal-key
        run: |
          python3 scripts/smoke_agent.py \
            --agent-base http://127.0.0.1:8020 \
            --market-base http://127.0.0.1:8014 \
            --news-base http://127.0.0.1:8016

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down compose stack
        if: always()
        run: docker compose down -v
